<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Analytics Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --secondary: #22c55e;
            --accent: #f87171;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-main);
            color: #e2e8f0;
            margin: 0;
            padding: 10px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary);
            margin: 20px 0;
        }

        /* --- CARDS --- */
        .card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* --- SETTINGS GRID --- */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input[type="number"], input[type="file"] {
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
        }

        /* --- BUTTONS --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 10px;
            border: none;
            background: var(--secondary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
            width: 100%;
        }

        .btn:active { transform: scale(0.98); }
        .btn-copy { background: var(--primary); padding: 6px 12px; font-size: 0.8rem; width: auto; }

        /* --- STATS BOXES --- */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: var(--bg-main);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-value { font-size: 1.1rem; font-weight: 700; display: block; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

        /* --- TABLES RESPONSIVE --- */
        .table-container {
            overflow-x: auto;
            margin-top: 10px;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; /* Force scroll on mobile */
        }

        th {
            background: #334155;
            color: var(--primary);
            font-size: 0.75rem;
            padding: 12px 8px;
            text-transform: uppercase;
        }

        td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .effort-row { background: rgba(34, 197, 94, 0.1); }

        /* --- CHART CUSTOM --- */
        #chartWrapper {
            height: 300px;
            position: relative;
        }

        @media (min-width: 768px) {
            body { padding: 30px; }
            h1 { font-size: 2rem; }
            .btn { width: auto; }
            .summary-grid { gap: 20px; }
            .stat-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Analyse Running</h1>

    <div class="card">
        <div class="settings-grid">
            <div class="input-group">
                <label>VMA (km/h)</label>
                <input type="number" id="vmaInput" value="18" step="0.5">
            </div>
            <div class="input-group">
                <label>FC Max</label>
                <input type="number" id="hrMaxInput" value="195">
            </div>
            <div class="input-group">
                <label>Fichier Suunto (JSON)</label>
                <input type="file" id="fileInput">
            </div>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <div id="summary"></div>

        <div class="card">
            <div id="chartWrapper">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div class="card" id="seriesCard"></div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0; color:var(--primary)">Tous les tours</h3>
                <button class="btn btn-copy" onclick="copyTable('detailsTable')">📋 Copier</button>
            </div>
            <div class="table-container">
                <table id="detailsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Type</th>
                            <th>Dist.</th>
                            <th>Durée</th>
                            <th>Allure</th>
                            <th>FC (Moy)</th>
                            <th>Cadence</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
        
        <div style="text-align: center; margin-bottom: 30px;">
            <button class="btn" onclick="exportCSV()">📥 Télécharger CSV</button>
        </div>
    </div>
</div>

<script>
    let intervalsGlobal = [];
    let satMin = Infinity, satMax = -Infinity;

    document.getElementById('fileInput').addEventListener('change', e => {
        const reader = new FileReader();
        reader.onload = () => {
            analyze(JSON.parse(reader.result));
            document.getElementById('mainContent').style.display = 'block';
        };
        reader.readAsText(e.target.files[0]);
    });

    function getValue(field) {
        if (!field) return 0;
        if (typeof field === "number") return field;
        if (field.Value !== undefined) return field.Value;
        if (field.Avg !== undefined) return field.Avg;
        if (Array.isArray(field)) return getValue(field[0]);
        return 0;
    }

    function getUserSettings() {
        return {
            vma: parseFloat(document.getElementById('vmaInput').value) || 18,
            hrMax: parseInt(document.getElementById('hrMaxInput').value) || 195
        };
    }

    function analyze(data) {
        const settings = getUserSettings();
        let intervals = [];

        if (data.DeviceLog.Samples) {
            data.DeviceLog.Samples.forEach(s => {
                if (s.NumberOfSatellites !== undefined) {
                    satMin = Math.min(satMin, s.NumberOfSatellites);
                    satMax = Math.max(satMax, s.NumberOfSatellites);
                }
            });
        }

        data.DeviceLog.Windows.forEach((w1, index) => {
            const w = w1.Window;
            if (w.Type === "Activity" || w.Type === "Move") return;

            const dist = getValue(w.Distance);
            const dur = getValue(w.Duration);
            const speedObj = w.Speed?.[0] || {};
            const sAvg = speedObj.Avg || (dur > 0 ? dist / dur : 0);
            
            const hrObj = w.HR?.[0] || {};
            const hAvg = hrObj.Avg ? Math.round(hrObj.Avg * 60) : null;
            const hMax = hrObj.Max ? Math.round(hrObj.Max * 60) : null;
            const hMin = hrObj.Min ? Math.round(hrObj.Min * 60) : null;

            let type = w.IntervalType || ((sAvg * 3.6 > settings.vma * 0.75) ? "Effort" : "Récup");

            intervals.push({
                num: index + 1, type,
                distance: Math.round(dist),
                duration: Math.round(dur),
                pace: speedToPace(sAvg),
                paceSec: sAvg > 0 ? 1000 / sAvg : 0,
                speedKmH: sAvg * 3.6,
                sMin: (speedObj.Min || sAvg) * 3.6,
                sMax: (speedObj.Max || sAvg) * 3.6,
                hAvg, hMin, hMax,
                cadence: w.Cadence?.[0]?.Avg ? Math.round(w.Cadence[0].Avg * 120) : '-'
            });
        });

        intervalsGlobal = intervals;
        const groups = groupIntervals(intervals, 0.20);
        display(intervals, groups, data, settings);
        drawChart(intervals, settings);
    }

    function display(intervals, groups, data, settings) {
        const header = data.DeviceLog.Header;
        
        // 1. Synthèse par distance (Calcul unique)
        const distanceMap = {};
        intervals.forEach(i => {
            if (i.type === "Interval" || i.type === "Effort") {
                const roundedDist = Math.round(i.distance / 10) * 10;
                if (!distanceMap[roundedDist]) distanceMap[roundedDist] = { dists: [], durs: [], speeds: [] };
                distanceMap[roundedDist].dists.push(i.distance);
                distanceMap[roundedDist].durs.push(i.duration);
                distanceMap[roundedDist].speeds.push(i.speedKmH);
            }
        });

        let distLines = Object.keys(distanceMap).sort((a,b)=>a-b).map(d => {
            const m = distanceMap[d];
            return `<b>${Math.round(avg(m.dists))}m</b> = ${formatTime(avg(m.durs))} (${speedToPace(avg(m.speeds)/3.6)}/km)`;
        });

        // 2. HTML Résumé (Stats Cards)
        document.getElementById('summary').innerHTML = `
            <div class="summary-grid">
                <div class="stat-box"><span class="stat-label">Distance</span><span class="stat-value">${(header.Distance/1000).toFixed(2)}km</span></div>
                <div class="stat-box"><span class="stat-label">Durée</span><span class="stat-value">${Math.round(header.Duration/60)}'</span></div>
                <div class="stat-box"><span class="stat-label">Sats</span><span class="stat-value">${satMin === Infinity ? '-' : satMax}</span></div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="margin:0; font-size:1rem; color:var(--primary)">Résumé par distance</h3>
                    <button class="btn btn-copy" onclick="copyText('textSummary')">📋</button>
                </div>
                <p id="textSummary" style="font-family:monospace; font-size:0.9rem; margin:0; background:var(--bg-main); padding:10px; border-radius:8px;">
                    ${distLines.join(' - ') || 'Aucun intervalle détecté'}
                </p>
            </div>
        `;

        // 3. HTML Tableau des Séries
        let seriesHtml = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0; color:var(--primary)">Analyse des Séries</h3>
                <button class="btn btn-copy" onclick="copyTable('seriesTable')">📋 Copier</button>
            </div>
            <div class="table-container">
                <table id="seriesTable">
                    <thead>
                        <tr><th>Série</th><th>Dist.</th><th>Allure</th><th>%VMA</th><th>Stab.</th><th>Dérive FC</th></tr>
                    </thead>
                    <tbody>`;

        groups.forEach(g => {
            const avgSpeed = avg(g.items.map(i => i.speedKmH));
            const percentVMA = Math.round((avgSpeed / settings.vma) * 100);
            const vMin = avg(g.items.map(i => i.sMin));
            const vMax = avg(g.items.map(i => i.sMax));
            const stability = vMax > 0 ? (100 - ((vMax - vMin) / vMax * 100)).toFixed(1) : "0.0";
            const hrMin = avg(g.items.map(i => i.hMin).filter(h => h > 0));
            const hrMax = avg(g.items.map(i => i.hMax).filter(h => h > 0));
            
            const isEffort = g.type.includes('Effort') || g.type.includes('Interval') || percentVMA > 75;
            const diff = isEffort ? Math.round(hrMax - hrMin) : Math.round(hrMin - hrMax);
            const color = diff > 15 ? "#f87171" : (diff > 0 ? "#4ade80" : "#94a3b8");

            seriesHtml += `<tr class="${isEffort ? 'effort-row' : ''}">
                <td>${g.items.length}x ${g.type}</td>
                <td>${Math.round(avg(g.items.map(i=>i.distance)))}m</td>
                <td>${speedToPace(avgSpeed/3.6)}</td>
                <td>${percentVMA}%</td>
                <td>${stability}%</td>
                <td style="color:${color}">${Math.round(hrMin)}➔${Math.round(hrMax)} (${diff > 0 ? '+' : ''}${diff})</td>
            </tr>`;
        });
        document.getElementById('seriesCard').innerHTML = seriesHtml + "</tbody></table></div>";

        // 4. Tableau détaillé
        document.getElementById('tableBody').innerHTML = intervals.map(i => `
            <tr>
                <td>${i.num}</td>
                <td>${i.type}</td>
                <td>${i.distance}m</td>
                <td>${formatTime(i.duration)}</td>
                <td>${i.pace}</td>
                <td>${i.hAvg || '-'}</td>
                <td>${i.cadence}</td>
            </tr>
        `).join('');
    }

    function drawChart(intervals, settings) {
        const ctx = document.getElementById('chart').getContext('2d');
        if (window.myChart) window.myChart.destroy();

        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: intervals.map(i => i.num),
                datasets: [
                    { label: 'Allure', data: intervals.map(i => i.paceSec), borderColor: '#38bdf8', yAxisID: 'y', tension: 0.3 },
                    { label: 'FC', data: intervals.map(i => i.hAvg), borderColor: '#f87171', yAxisID: 'y1', tension: 0.3 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { reverse: true, ticks: { callback: v => Math.floor(v/60) + ':' + (v%60).toString().padStart(2,'0') } },
                    y1: { position: 'right', min: 100, max: settings.hrMax }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    /* UTILS */
    function formatTime(s) {
        s = Math.round(s);
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return m > 0 ? `${m}'${sec.toString().padStart(2, '0')}"` : `${sec}"`;
    }

    function speedToPace(s) {
        if (!s || s <= 0) return "-";
        const p = 1000 / s;
        return Math.floor(p/60) + ":" + Math.round(p%60).toString().padStart(2, '0');
    }

    function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0; }

    function groupIntervals(intervals, tolerance) {
        let groups = [];
        if (!intervals.length) return groups;
        let current = { type: intervals[0].type, distRef: intervals[0].distance, items: [intervals[0]] };
        for (let i = 1; i < intervals.length; i++) {
            const item = intervals[i];
            const diff = Math.abs(item.distance - current.distRef) / current.distRef;
            if (item.type === current.type && diff <= tolerance) current.items.push(item);
            else { groups.push(current); current = { type: item.type, distRef: item.distance, items: [item] }; }
        }
        groups.push(current);
        return groups;
    }

    function copyText(id) {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
        alert("Copié !");
    }

    function copyTable(id) {
        const el = document.getElementById(id);
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert("Tableau copié !");
    }

    function exportCSV() {
        let csv = "ID,Type,Distance,Duree,Allure,FC,Cadence\n" + 
            intervalsGlobal.map(i => `${i.num},${i.type},${i.distance},${i.duration},${i.pace},${i.hAvg},${i.cadence}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'analyse_suunto.csv');
        a.click();
    }
</script>

</body>
</html>
